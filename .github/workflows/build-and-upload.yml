name: Build and Publish Docker Image

on:
  push:
    branches:
      - main
    tags:
      - 'Release-*'
  
  workflow_dispatch:

permissions:
  contents: write

jobs:
  allatonce:
    if: github.ref != 'refs/pull/develop'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: true
        fetch-depth: 0

    - name: Get version from Git tags
      id: get_version
      run: |
        LATEST_TAG=$(git describe --tags --match "Release-*" --abbrev=0 2>/dev/null || true)
        if [ -z "$LATEST_TAG" ]; then
          APP_VERSION="1.0.0"
        else
          VERSION_NUMBER=$(echo "$LATEST_TAG" | sed 's/^Release-//')
          DISTANCE=$(git rev-list --count "$LATEST_TAG"..HEAD)

          if [ "$DISTANCE" -gt 0 ]; then
            VERSION_NUMBER=$(echo "$VERSION_NUMBER" | awk -F. -v OFS=. '{$3 += 1; print}')
            APP_VERSION="$VERSION_NUMBER-rc.$DISTANCE"
          else
            APP_VERSION="$VERSION_NUMBER"
          fi
        fi

        IMAGE_VERSION="v$APP_VERSION"
        echo "APP_VERSION=$APP_VERSION" >> "$GITHUB_OUTPUT"
        echo "IMAGE_VERSION=$IMAGE_VERSION" >> "$GITHUB_OUTPUT"
        echo "Using app version: $APP_VERSION"
        echo "Using image tag: $IMAGE_VERSION"

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_HUB_USER }}
        password: ${{ secrets.DOCKER_HUB_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile
        push: true
        build-args: |
          PKG_VERSION=${{ steps.get_version.outputs.APP_VERSION }}
        tags: |
          docker.io/${{ secrets.DOCKER_HUB_USER }}/linuxsoundscanner:latest
          docker.io/${{ secrets.DOCKER_HUB_USER }}/linuxsoundscanner:${{ steps.get_version.outputs.IMAGE_VERSION }}
        labels: |
          org.opencontainers.image.version=${{ steps.get_version.outputs.APP_VERSION }}
          org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

    - name: Prepare docker-compose release artifact
      id: prepare_compose
      run: |
        ARTIFACT_DIR=$(mktemp -d)
        ARTIFACT_PATH="$ARTIFACT_DIR/docker-compose.yml"
        cp ./deploy-via-docker/docker-compose.yml "$ARTIFACT_PATH"
        sed -i 's|\$image_name\$|${{ secrets.DOCKER_HUB_USER }}/linuxsoundscanner|g' "$ARTIFACT_PATH"
        sed -i 's/\$version\$/${{ steps.get_version.outputs.IMAGE_VERSION }}/g' "$ARTIFACT_PATH"
        echo "Prepared docker-compose artifact:"
        cat "$ARTIFACT_PATH"
        echo "artifact_path=$ARTIFACT_PATH" >> "$GITHUB_OUTPUT"

    - name: Upload docker-compose workflow artifact
      uses: actions/upload-artifact@v4
      with:
        name: linuxsoundscanner-docker-compose-${{ steps.get_version.outputs.IMAGE_VERSION }}
        path: ${{ steps.prepare_compose.outputs.artifact_path }}
        if-no-files-found: error

    - name: Attach docker-compose to GitHub release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        files: ${{ steps.prepare_compose.outputs.artifact_path }}
